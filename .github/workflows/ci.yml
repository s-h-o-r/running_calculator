name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
  
      - name: Setup Python
        uses: actions/checkout@v5
        with: 
          python-version: "3.12"
      
      - name: Install env
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing


